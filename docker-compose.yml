version: "3.9"
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mairi-db
    environment:
      POSTGRES_DB: mairi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mairi"]
      interval: 10s
      timeout: 5s
      retries: 5

  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: mairi-be
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: uv run fastapi dev main.py --host 0.0.0.0 --port 3333
    environment:
      VERSION: /api
      SECRET: super-secret-local-value
      TTL_TOKEN: 10080
      FRONTEND: http://localhost:3000
      ENVIRONMENT: local
      BACKEND: http://localhost:3333
      PROJECT_NAME: mairi
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mairi
    ports:
      - "3333:3333"
    volumes:
      - ./be:/app

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: mairi-fe
    depends_on:
      - be
    working_dir: /app
    command: bun run dev
    ports:
      - "3000:3000"
    volumes:
      - ./fe:/app
      - fe_node_modules:/app/node_modules

volumes:
  postgres_data:
  fe_node_modules:
