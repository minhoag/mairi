version: "3.9"
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mairi-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: mairi-be
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: uv run fastapi dev main.py --host 0.0.0.0 --port 3333
    environment:
      VERSION: ${VERSION}
      SECRET: ${SECRET}
      TTL_TOKEN: ${TTL_TOKEN}
      ENVIRONMENT: ${ENVIRONMENT}
      APP_HOST: ${APP_HOST}
      FE_HOST_PORT: ${FE_HOST_PORT}
      BE_HOST_PORT: ${BE_HOST_PORT}
      PROJECT_NAME: ${PROJECT_NAME}
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${BE_HOST_PORT}:3333"
    volumes:
      - ./be:/app

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: mairi-fe
    depends_on:
      - be
    working_dir: /app
    command: bun run dev
    ports:
      - "${FE_HOST_PORT}:3000"
    volumes:
      - ./fe:/app
      - fe_node_modules:/app/node_modules

volumes:
  postgres_data:
  fe_node_modules:
